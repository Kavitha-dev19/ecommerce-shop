<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopKavitha - Online Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">🛍️ ShopKavitha</div>
    <div class="search-bar">
        <input type="text" id="searchInput" 
               placeholder="Search products...">
        <button onclick="searchProducts()">
            <i class="fas fa-search"></i>
        </button>
    </div>
    <div class="nav-links">
        <a href="#products">Products</a>
        <a href="cart.html">
            🛒 Cart 
            <span id="cart-count">0</span>
        </a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to ShopKavitha</h1>
    <p>Find the best products at amazing prices!</p>
    <a href="#products" class="btn">Shop Now</a>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <button class="cat-btn active" 
            onclick="filterCategory('all')">
            All</button>
    <button class="cat-btn" 
            onclick="filterCategory('Electronics')">
            Electronics</button>
    <button class="cat-btn" 
            onclick="filterCategory('Clothing')">
            Clothing</button>
    <button class="cat-btn" 
            onclick="filterCategory('Books')">
            Books</button>
    <button class="cat-btn" 
            onclick="filterCategory('Food')">
            Food</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products">
    <h2>Our Products</h2>
    <div class="products-grid" id="products-grid">
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>Made with ❤️ by Kavitha</p>
</footer>

<script src="script.js"></script>
</body>
</html>
