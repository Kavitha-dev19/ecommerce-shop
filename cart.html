<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - ShopKavitha</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .cart-item {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-info h3 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .cart-item-info p {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quantity-controls button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        .cart-total {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: right;
        }
        .cart-total h2 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .cart-total .total-price {
            font-size: 1.8rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .checkout-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .checkout-btn:hover {
            background: #e74c3c;
        }
        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .empty-cart h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">🛍️ ShopKavitha</div>
    <div class="nav-links">
        <a href="index.html">🏠 Home</a>
    </div>
</nav>

<div class="cart-container">
    <h2 style="margin-bottom:25px; 
        color:#2c3e50;">🛒 Your Cart</h2>
    <div id="cart-items"></div>
    <div id="cart-total"></div>
</div>

<footer>
    <p>Made with ❤️ by Kavitha</p>
</footer>

<script>
let cart = JSON.parse(
    localStorage.getItem('cart')) || [];

function displayCart() {
    const cartItems = document.getElementById(
        'cart-items');
    const cartTotal = document.getElementById(
        'cart-total');

    if (cart.length === 0) {
        cartItems.innerHTML = `
            <div class="empty-cart">
                <h2>🛒 Your cart is empty!</h2>
                <p>Go back and add some products</p>
                <a href="index.html" 
                   class="btn" 
                   style="margin-top:20px">
                   Shop Now</a>
            </div>`;
        cartTotal.innerHTML = '';
        return;
    }

    cartItems.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
        total += item.price * item.quantity;
        cartItems.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}" 
                     alt="${item.name}">
                <div class="cart-item-info">
                    <h3>${item.name}</h3>
                    <p>₹${item.price}</p>
                    <span style="color:#666">
                        ${item.category}</span>
                </div>
                <div class="quantity-controls">
                    <button onclick="changeQty(
                        ${item.id}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQty(
                        ${item.id}, 1)">+</button>
                </div>
                <p style="font-weight:bold;
                    color:#2c3e50; 
                    min-width:80px;
                    text-align:right">
                    ₹${item.price * item.quantity}
                </p>
                <button class="remove-btn"
                    onclick="removeItem(${item.id})">
                    Remove</button>
            </div>`;
    });

    cartTotal.innerHTML = `
        <div class="cart-total">
            <h2>Order Summary</h2>
            <p>${cart.length} items in cart</p>
            <div class="total-price">
                Total: ₹${total}</div>
            <button class="checkout-btn"
                onclick="checkout()">
                Proceed to Checkout ✓
            </button>
        </div>`;
}

function changeQty(id, change) {
    const item = cart.find(p => p.id === id);
    if (item) {
        item.quantity += change;
        if (item.quantity <= 0) {
            cart = cart.filter(p => p.id !== id);
        }
    }
    localStorage.setItem('cart', 
        JSON.stringify(cart));
    displayCart();
}

function removeItem(id) {
    cart = cart.filter(p => p.id !== id);
    localStorage.setItem('cart', 
        JSON.stringify(cart));
    displayCart();
}

function checkout() {
    alert('🎉 Order placed successfully!\nThank you for shopping with ShopKavitha!');
    cart = [];
    localStorage.setItem('cart', 
        JSON.stringify(cart));
    displayCart();
}

displayCart();
</script>
</body>
</html>
